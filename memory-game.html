<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Memory Match</title>
<style>
  :root {
    --bg: #1e1b2e;
    --card: #2a2640;
    --accent: #7c5cff;
    --accent2: #40c9a2;
    --text: #f0eefc;
    --muted: #a89fcf;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(160deg, var(--bg), #2d2a45);
    font-family: 'Segoe UI', Tahoma, sans-serif;
    color: var(--text);
    padding: 1.5rem;
  }
  .wrap {
    width: 100%;
    max-width: 640px;
    text-align: center;
  }
  h1 {
    margin: 0 0 1rem;
    font-size: 1.8rem;
    letter-spacing: 1px;
  }

  /* ---- Start screen ---- */
  .panel {
    background: var(--card);
    border-radius: 20px;
    padding: 2.5rem 2rem;
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
  }
  .panel p { color: var(--muted); margin-top: 0; }
  select {
    margin: 0.5rem 0 1.2rem;
    padding: 0.6rem 1rem;
    border-radius: 10px;
    border: 2px solid #453f66;
    background: #201c33;
    color: var(--text);
    font-size: 1rem;
    outline: none;
  }
  #bestPreview {
    font-size: 0.85rem;
    color: var(--accent2);
    margin-bottom: 1.2rem;
    min-height: 1.2rem;
  }
  button {
    padding: 0.85rem 1.4rem;
    font-size: 1.05rem;
    font-weight: bold;
    border: none;
    border-radius: 12px;
    background: var(--accent);
    color: white;
    cursor: pointer;
    transition: transform 0.1s, background 0.2s;
  }
  button:hover { background: #6a4be0; }
  button:active { transform: scale(0.97); }
  .hidden { display: none; }

  /* ---- Game screen ---- */
  .stats {
    display: flex;
    justify-content: space-between;
    font-size: 0.95rem;
    color: #cfc9ea;
    margin-bottom: 1rem;
    padding: 0 0.25rem;
  }
  .stats span b {
    color: var(--accent2);
    font-size: 1.2rem;
    display: block;
  }
  #board {
    display: grid;
    gap: 0.6rem;
    margin-bottom: 1.2rem;
  }
  .card {
    aspect-ratio: 1;
    perspective: 600px;
    cursor: pointer;
  }
  .card-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transition: transform 0.35s;
    transform-style: preserve-3d;
  }
  .card.flipped .card-inner,
  .card.matched .card-inner {
    transform: rotateY(180deg);
  }
  .face {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 10px;
    backface-visibility: hidden;
    font-size: clamp(1.2rem, 5vw, 1.8rem);
  }
  .face.front {
    background: #382f5c;
    border: 2px solid #453f66;
    color: var(--accent);
    font-weight: bold;
  }
  .face.back {
    background: #201c33;
    border: 2px solid var(--accent2);
    transform: rotateY(180deg);
  }
  .card.matched .face.back {
    border-color: var(--accent2);
    background: #1c3d34;
    opacity: 0.85;
  }
  .card:not(.flipped):not(.matched):hover .face.front { background: #453a70; }
  #restartBtn {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--muted);
    padding: 0.5rem 1rem;
    font-size: 0.85rem;
  }
  #restartBtn:hover { color: var(--text); border-color: var(--text); background: transparent; }

  /* ---- Win overlay ---- */
  #overScreen .final {
    font-size: 2.5rem;
    color: var(--accent2);
    margin: 0.5rem 0;
  }
</style>
</head>
<body>
  <div class="wrap">
    <h1>🧠 Memory Match</h1>

    <div id="startScreen" class="panel">
      <p>Flip cards and find every matching pair. Fewer moves = higher score.</p>
      <div>
        <label for="difficulty">Difficulty</label><br>
        <select id="difficulty">
          <option value="easy">Easy (4×4 — 8 pairs)</option>
          <option value="medium" selected>Medium (5×4 — 10 pairs)</option>
          <option value="hard">Hard (6×6 — 18 pairs)</option>
        </select>
      </div>
      <div id="bestPreview"></div>
      <button id="startBtn">Start Game</button>
    </div>

    <div id="gameScreen" class="hidden">
      <div class="stats">
        <span>Moves<b id="moves">0</b></span>
        <span>Pairs<b id="pairs">0/0</b></span>
        <span>Best<b id="bestMoves">–</b></span>
        <span><button id="restartBtn">New Game</button></span>
      </div>
      <div id="board"></div>
    </div>

    <div id="overScreen" class="hidden panel">
      <p id="overTitle">You matched every pair!</p>
      <div class="final" id="finalMoves">0</div>
      <p id="finalDetail"></p>
      <button id="playAgainBtn">Play Again</button>
    </div>
  </div>

<script>
  const startScreen = document.getElementById('startScreen');
  const gameScreen = document.getElementById('gameScreen');
  const overScreen = document.getElementById('overScreen');
  const startBtn = document.getElementById('startBtn');
  const restartBtn = document.getElementById('restartBtn');
  const playAgainBtn = document.getElementById('playAgainBtn');
  const difficultySel = document.getElementById('difficulty');
  const bestPreviewEl = document.getElementById('bestPreview');
  const boardEl = document.getElementById('board');
  const movesEl = document.getElementById('moves');
  const pairsEl = document.getElementById('pairs');
  const bestMovesEl = document.getElementById('bestMoves');
  const finalMovesEl = document.getElementById('finalMoves');
  const finalDetailEl = document.getElementById('finalDetail');
  const overTitleEl = document.getElementById('overTitle');

  const DIFFICULTY = {
    easy:   { cols: 4, rows: 4 },
    medium: { cols: 5, rows: 4 },
    hard:   { cols: 6, rows: 6 }
  };

  const SYMBOLS = ['🍎','🍋','🍇','🍉','🍓','🍒','🍑','🥝','🍌','🥥','🍍','🥑','🌶️','🥕','🍄','🌽','🍞','🧀','🍔','🍕'];

  const BEST_KEY_PREFIX = 'memorygame_best_';

  let deck = [];
  let flipped = [];
  let matchedCount = 0;
  let totalPairs = 0;
  let moves = 0;
  let locked = false;

  function getBest(level) {
    const val = localStorage.getItem(BEST_KEY_PREFIX + level);
    return val ? parseInt(val, 10) : null;
  }

  function setBest(level, value) {
    localStorage.setItem(BEST_KEY_PREFIX + level, String(value));
  }

  function updateBestPreview() {
    const best = getBest(difficultySel.value);
    bestPreviewEl.textContent = best ? `Best on this difficulty: ${best} moves` : 'No best score yet on this difficulty';
  }

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function buildDeck(level) {
    const { cols, rows } = DIFFICULTY[level];
    const pairCount = (cols * rows) / 2;
    const symbols = shuffle(SYMBOLS.slice()).slice(0, pairCount);
    const cards = shuffle(symbols.concat(symbols)).map((symbol, i) => ({
      id: i,
      symbol,
      matched: false
    }));
    return { cards, cols, pairCount };
  }

  function renderBoard() {
    boardEl.style.gridTemplateColumns = `repeat(${deck.cols}, 1fr)`;
    boardEl.innerHTML = '';
    deck.cards.forEach((card, i) => {
      const el = document.createElement('div');
      el.className = 'card';
      el.dataset.index = i;
      el.innerHTML = `
        <div class="card-inner">
          <div class="face front">?</div>
          <div class="face back">${card.symbol}</div>
        </div>
      `;
      el.addEventListener('click', () => handleFlip(i));
      boardEl.appendChild(el);
    });
  }

  function handleFlip(i) {
    if (locked) return;
    const card = deck.cards[i];
    if (card.matched) return;
    const el = boardEl.children[i];
    if (el.classList.contains('flipped')) return;
    if (flipped.length === 2) return;

    el.classList.add('flipped');
    flipped.push(i);

    if (flipped.length === 2) {
      moves++;
      movesEl.textContent = moves;
      locked = true;
      const [a, b] = flipped;
      if (deck.cards[a].symbol === deck.cards[b].symbol) {
        deck.cards[a].matched = true;
        deck.cards[b].matched = true;
        boardEl.children[a].classList.add('matched');
        boardEl.children[b].classList.add('matched');
        matchedCount++;
        pairsEl.textContent = `${matchedCount}/${totalPairs}`;
        flipped = [];
        locked = false;
        if (matchedCount === totalPairs) {
          setTimeout(finishGame, 400);
        }
      } else {
        setTimeout(() => {
          boardEl.children[a].classList.remove('flipped');
          boardEl.children[b].classList.remove('flipped');
          flipped = [];
          locked = false;
        }, 700);
      }
    }
  }

  function startGame() {
    const level = difficultySel.value;
    deck = buildDeck(level);
    totalPairs = deck.pairCount;
    matchedCount = 0;
    moves = 0;
    flipped = [];
    locked = false;

    movesEl.textContent = 0;
    pairsEl.textContent = `0/${totalPairs}`;
    const best = getBest(level);
    bestMovesEl.textContent = best ? best : '–';

    startScreen.classList.add('hidden');
    overScreen.classList.add('hidden');
    gameScreen.classList.remove('hidden');

    renderBoard();
  }

  function finishGame() {
    const level = difficultySel.value;
    const best = getBest(level);
    const isNewBest = !best || moves < best;
    if (isNewBest) setBest(level, moves);

    gameScreen.classList.add('hidden');
    overScreen.classList.remove('hidden');
    finalMovesEl.textContent = `${moves} moves`;
    finalDetailEl.textContent = isNewBest
      ? `🎉 New best for ${level} mode!`
      : `Best for ${level} mode: ${best} moves`;

    const pairCount = totalPairs;
    const score = Math.max(10, pairCount * 50 - moves * 5);
    if (window.parent !== window) {
      window.parent.postMessage({ type: 'gh-score', score }, '*');
    }
  }

  startBtn.addEventListener('click', startGame);
  restartBtn.addEventListener('click', () => {
    overScreen.classList.add('hidden');
    gameScreen.classList.add('hidden');
    startScreen.classList.remove('hidden');
    updateBestPreview();
  });
  playAgainBtn.addEventListener('click', () => {
    overScreen.classList.add('hidden');
    startScreen.classList.remove('hidden');
    updateBestPreview();
  });
  difficultySel.addEventListener('change', updateBestPreview);

  updateBestPreview();
</script>
</body>
</html>
