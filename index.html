<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Game Hub</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root {
    --bg: #1e1b2e;
    --card: #2a2640;
    --card-hover: #362f52;
    --accent: #7c5cff;
    --accent2: #40c9a2;
    --text: #f0eefc;
    --muted: #a89fcf;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: linear-gradient(160deg, var(--bg), #2d2a45);
    font-family: 'Segoe UI', Tahoma, sans-serif;
    color: var(--text);
  }

  /* ---- Name screen ---- */
  #name-screen {
    max-width: 380px;
    margin: 0 auto;
    padding: 6rem 1.5rem;
    text-align: center;
  }
  #name-screen h1 {
    font-size: 2.2rem;
    margin-bottom: 0.25rem;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  #name-screen p {
    color: var(--muted);
    margin-bottom: 2rem;
  }
  #name-input {
    width: 100%;
    padding: 0.75rem 1rem;
    font-size: 1rem;
    border-radius: 10px;
    border: 2px solid #453f66;
    background: #201c33;
    color: var(--text);
    outline: none;
    margin-bottom: 1rem;
  }
  #name-input:focus { border-color: var(--accent); }
  #name-continue {
    width: 100%;
    padding: 0.8rem;
    font-size: 1rem;
    font-weight: bold;
    border: none;
    border-radius: 10px;
    background: var(--accent);
    color: white;
    cursor: pointer;
  }
  #name-continue:hover { background: #6a4be0; }

  /* ---- Menu screen ---- */
  #menu {
    display: none;
    max-width: 900px;
    margin: 0 auto;
    padding: 1.5rem;
  }
  #user-bar {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    justify-content: flex-end;
    margin-bottom: 1.5rem;
    font-size: 0.9rem;
    color: var(--muted);
  }
  #change-name-btn {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--muted);
    border-radius: 8px;
    padding: 0.35rem 0.75rem;
    font-size: 0.8rem;
    cursor: pointer;
  }
  #change-name-btn:hover { color: var(--text); border-color: var(--text); }
  #menu h1 {
    text-align: center;
    font-size: 2.2rem;
    margin-bottom: 0.25rem;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  #menu p.subtitle {
    text-align: center;
    color: var(--muted);
    margin-top: 0;
    margin-bottom: 2.5rem;
  }
  #grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 1.25rem;
  }
  .game-card {
    background: var(--card);
    border-radius: 16px;
    padding: 1.75rem 1.25rem;
    text-align: center;
    border: 1px solid transparent;
    transition: border-color 0.15s ease;
  }
  .game-card:hover { border-color: var(--accent); }
  .game-card .icon {
    font-size: 2.75rem;
    margin-bottom: 0.75rem;
  }
  .game-card h2 {
    font-size: 1.15rem;
    margin: 0 0 0.4rem;
  }
  .game-card p {
    font-size: 0.9rem;
    color: var(--muted);
    margin: 0 0 0.9rem;
  }
  .play-btn {
    width: 100%;
    padding: 0.6rem;
    font-size: 0.95rem;
    font-weight: 600;
    border: none;
    border-radius: 10px;
    background: var(--accent);
    color: white;
    cursor: pointer;
    margin-bottom: 0.9rem;
  }
  .play-btn:hover { background: #6a4be0; }
  .leaderboard {
    text-align: left;
    font-size: 0.8rem;
    color: var(--muted);
    border-top: 1px solid #453f66;
    padding-top: 0.6rem;
  }
  .leaderboard .lb-title {
    font-weight: 600;
    color: var(--accent2);
    margin-bottom: 0.3rem;
  }
  .leaderboard ol {
    margin: 0;
    padding-left: 1.1rem;
  }
  .leaderboard li { margin-bottom: 0.15rem; }
  #empty {
    text-align: center;
    color: var(--muted);
    padding: 2rem;
    display: none;
  }

  /* ---- Player screen ---- */
  #player {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--bg);
    flex-direction: column;
  }
  #player.active { display: flex; }
  #player-bar {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.6rem 1rem;
    background: var(--card);
    flex-shrink: 0;
  }
  #back-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 0.5rem 1rem;
    font-size: 0.95rem;
    cursor: pointer;
  }
  #back-btn:hover { opacity: 0.9; }
  #player-title {
    font-weight: 600;
  }
  #score-toast {
    margin-left: auto;
    font-size: 0.85rem;
    color: var(--accent2);
  }
  #game-frame {
    flex: 1;
    border: none;
    width: 100%;
  }
</style>
</head>
<body>

<div id="name-screen">
  <h1>Game Hub</h1>
  <p>Enter a name to save your scores</p>
  <input id="name-input" type="text" maxlength="24" placeholder="Your name">
  <button id="name-continue">Continue</button>
</div>

<div id="menu">
  <div id="user-bar">
    <span id="user-name"></span>
    <button id="change-name-btn">Change name</button>
  </div>
  <h1>Game Hub</h1>
  <p class="subtitle">Pick a game to play</p>
  <div id="grid"></div>
  <div id="empty">No games found. Add an entry to the GAMES list in index.html.</div>
</div>

<div id="player">
  <div id="player-bar">
    <button id="back-btn">&larr; Back to Games</button>
    <span id="player-title"></span>
    <span id="score-toast"></span>
  </div>
  <iframe id="game-frame"></iframe>
</div>

<script>
  const SUPABASE_URL = "https://ygocgmbukezodqejktms.supabase.co";
  const SUPABASE_KEY = "sb_publishable_g36PXkjAI7bfvjOTczpghQ_VyLLgH3L";
  const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // To add a new game: create its HTML file in this folder, then add
  // one entry here: { title, file, icon, description }.
  const GAMES = [
    {
      title: "Math Blitz",
      file: "math-game.html",
      icon: "🧮",
      description: "Fast-paced arithmetic challenge"
    },
    {
      title: "Tic Tac Toe",
      file: "tictactoe.html",
      icon: "⭕",
      description: "Classic two-player grid game"
    },
    {
      title: "Tetris",
      file: "tetris.html",
      icon: "🧱",
      description: "Stack blocks with easy, medium & hard modes"
    }
  ];

  const NAME_KEY = 'gamehub_username';

  const nameScreen = document.getElementById('name-screen');
  const nameInput = document.getElementById('name-input');
  const nameContinue = document.getElementById('name-continue');
  const menu = document.getElementById('menu');
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  const userNameEl = document.getElementById('user-name');
  const changeNameBtn = document.getElementById('change-name-btn');
  const player = document.getElementById('player');
  const frame = document.getElementById('game-frame');
  const playerTitle = document.getElementById('player-title');
  const scoreToast = document.getElementById('score-toast');
  const backBtn = document.getElementById('back-btn');

  let currentGame = null;

  function getUsername() {
    return localStorage.getItem(NAME_KEY);
  }

  function setUsername(name) {
    localStorage.setItem(NAME_KEY, name);
  }

  function showNameScreen() {
    nameScreen.style.display = 'block';
    menu.style.display = 'none';
    nameInput.value = getUsername() || '';
    nameInput.focus();
  }

  function showMenu() {
    nameScreen.style.display = 'none';
    menu.style.display = 'block';
    userNameEl.textContent = getUsername();
    renderGames();
  }

  function renderGames() {
    grid.innerHTML = '';
    if (GAMES.length === 0) {
      empty.style.display = 'block';
      return;
    }
    GAMES.forEach(game => {
      const card = document.createElement('div');
      card.className = 'game-card';
      card.innerHTML = `
        <div class="icon">${game.icon || "🎮"}</div>
        <h2>${game.title}</h2>
        <p>${game.description || ""}</p>
        <button class="play-btn">Play</button>
        <div class="leaderboard">
          <div class="lb-title">Top Scores</div>
          <ol class="lb-list"><li>Loading...</li></ol>
        </div>
      `;
      card.querySelector('.play-btn').addEventListener('click', () => openGame(game));
      grid.appendChild(card);
      loadLeaderboard(game.file, card.querySelector('.lb-list'));
    });
  }

  async function loadLeaderboard(gameFile, listEl) {
    const { data, error } = await db
      .from('scores')
      .select('username, score')
      .eq('game', gameFile)
      .order('score', { ascending: false })
      .limit(5);

    if (error) {
      listEl.innerHTML = '<li>Couldn\'t load scores</li>';
      return;
    }
    if (!data || data.length === 0) {
      listEl.innerHTML = '<li>No scores yet — be the first!</li>';
      return;
    }
    listEl.innerHTML = data.map(row => `<li>${escapeHtml(row.username)} — ${row.score}</li>`).join('');
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  async function submitScore(gameFile, score) {
    const username = getUsername();
    await db.from('scores').insert({ username, game: gameFile, score });
  }

  function openGame(game) {
    currentGame = game;
    frame.src = game.file;
    playerTitle.textContent = game.title;
    scoreToast.textContent = '';
    menu.style.display = 'none';
    player.classList.add('active');
  }

  function closeGame() {
    player.classList.remove('active');
    frame.src = '';
    currentGame = null;
    showMenu();
  }

  window.addEventListener('message', async (event) => {
    if (!event.data || event.data.type !== 'gh-score' || !currentGame) return;
    scoreToast.textContent = `Score submitted: ${event.data.score}`;
    await submitScore(currentGame.file, event.data.score);
  });

  nameContinue.addEventListener('click', () => {
    const name = nameInput.value.trim();
    if (!name) {
      nameInput.focus();
      return;
    }
    setUsername(name);
    showMenu();
  });
  nameInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') nameContinue.click();
  });
  changeNameBtn.addEventListener('click', showNameScreen);
  backBtn.addEventListener('click', closeGame);

  if (getUsername()) {
    showMenu();
  } else {
    showNameScreen();
  }
</script>

</body>
</html>
